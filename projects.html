---
layout: default
title: Projects
---
<div class="projects-wrapper">
<div class="projects-container">
{% assign sorted_projects = site.projects | sort: "date" | reverse %}
{% for project in sorted_projects %}
  <div class="window-frame">
    <div class="project-card">
      <div class="title-bar">
        <span>{{ project.name }}</span>
      </div>
      <div class="project-card-content">
        {% if project.image %}
        <img src="{{ project.image }}" alt="{{ project.name }}" class="project-img">
        {% endif %}
        <div class="project-info">
          <p class="project-desc">{{ project.description }}</p>
        </div>
        <div class="project-buttons">
       <button class="win-btn proceed-btn" 
              data-name="{{ project.name }}"
              data-github="{{ project.github_url }}"
              data-itchio="{{ project.itchio_url }}"
              data-project="{{ project.project_url }}">Proceed</button>
          
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
</div>
<!-- DIALOG POPUP -->
<div class="dialog-overlay" id="dialog-overlay">
  <div class="dialog-box">
    <div class="title-bar">
      <span>Confirm</span>
    </div>
    <div class="dialog-content">
      <p id="dialog-text">Do you want to proceed to github page?</p>
       <div class="dialog-buttons" id="dialog-buttons">
       </div>
    </div>
  </div>
</div>
